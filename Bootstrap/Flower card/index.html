<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        .flex-container{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
    </style>


</head>
<body>
    <div class="flex-container">
        <div class="card" style="width: 18rem;">
            <img src="./flower.jpg" class="card-img-top" alt="flower">
            <div class="card-body">
              <h5 class="card-title">Card title</h5>
              <p class="card-text">O girassol (Helianthus annuus) é uma planta anual da família das Asteraceae, gênero Heliantheae. É cultivada pelo seu óleo e frutos comestíveis. O nome é derivado do formato de sua inflorescência.</p>
              <a href="https://pt.wikipedia.org/wiki/Girassol" class="btn btn-primary">Go somewhere</a>
            </div>
          </div>
    </div>
</body>
</html>
